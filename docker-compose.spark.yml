# Spark 3.5 standalone cluster for recommendation batch jobs.
#
# Start:  docker compose -f docker-compose.spark.yml up -d
# Stop:   docker compose -f docker-compose.spark.yml down
# UI:     http://localhost:8080 (Spark Master)
#
# Uses a shared Docker network named "hadoop". If Hadoop is started separately,
# attach it to the same named network; otherwise this compose file can create it
# so the Spark standalone cluster still starts for local development.
services:
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - .:/app:ro
    networks:
      - hadoop

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - .:/app:ro
    networks:
      - hadoop

networks:
  hadoop:
    name: hadoop
